server:
  port: ${PORT:9092}

spring:
  application:
    name: txn-settlement-simulator

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:recon}?search_path=${RECON_SCHEMA:recon},${SETTLEMENT_SCHEMA:settlement_20230727},public
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Juspay}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: ${SCHEMA:recon}
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: settlement-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.juspay.settlement.model
        spring.json.value.default.type: com.juspay.settlement.model.SettlementEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
    listener:
      ack-mode: record
      concurrency: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.juspay.settlement: ${LOG_LEVEL:INFO}
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Schema configurations
schema:
  recon-schema: ${RECON_SCHEMA:recon}
  settlement-schema: ${SETTLEMENT_SCHEMA:settlement_20230727}

# Settlement specific configurations
settlement:
  topics:
    transaction-instructions: txn-settlement-instructions
    settlement-flow: settlement-flow-events
    settlement-status: settlement-status-updates
  batch:
    size: ${SETTLEMENT_BATCH_SIZE:100}
    timeout-ms: ${SETTLEMENT_BATCH_TIMEOUT_MS:5000}
  external-api:
    base-url: ${MORPHEUS_API_URL:http://localhost:8080}
    endpoint: ${MORPHEUS_API_ENDPOINT:/api/v1/settle}
    timeout-ms: ${API_TIMEOUT_MS:30000}
